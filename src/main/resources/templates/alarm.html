<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>QWER 알람</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/alarm.css}">
</head>
<body>
<nav class="main-nav">
  <div class="nav-left">
    <a href="/alarm" class="nav-item">알람</a>
    <a href="/auth/timer" class="nav-item">타이머</a>
    <a href="/auth/schedule" class="nav-item">스케줄</a>
    <a href="/auth/shop" class="nav-item">상점</a>
    <a href="/auth/shop/inventory" class="nav-item">인벤토리</a>
  </div>

  <div class="nav-right">
    <span class="user-info">
      <strong id="navNickname">로딩 중...</strong>님
      (<span id="navPoint">0</span> P)
    </span>
    <button id="themeToggle" class="nav-item" style="background:none; border:none; cursor:pointer; font-size: 1.2em;">🌓</button>
  </div>
</nav>
<div class="fixed-avatar-wrapper" th:if="${avatar != null}">
  <div class="avatar-view" id="avatarBody">
    <img src="/images/avatar/Avatar.gif" class="layer-base">

    <img th:if="${avatar.currentClothesPath}"
         th:src="${avatar.currentClothesPath}" class="layer-clothes">

    <img th:if="${avatar.currentHatPath}"
         th:src="${avatar.currentHatPath}"
         class="layer-hat"
         th:classappend="${avatar.equippedHat != null and avatar.equippedHat.category == 'HAT' ? 'type-hap' : 'type-cap'}">
  </div>
</div>
<div class="welcome">
  <th:block th:if="${username != null}">
    환영합니다, <span th:text="${username}"></span>님!
    <a href="/auth/logout">로그아웃</a>
    <form th:action="@{/alarm/delete}" method="post" style="display:inline;"
          onsubmit="return confirm('정말로 탈퇴하시겠습니까?');">
      <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer; font:inherit; padding:0; vertical-align: baseline;">회원탈퇴</button>
    </form>
  </th:block>
  <th:block th:if="${username == null}">
    <a href="/auth/login">로그인</a>
  </th:block>
</div>

<div class="alarm-history">
  <h2>최근 알람 기록</h2>
  <ul id="historyList">
  </ul>
</div>

<div class="alarm-clock" id="alarmClockCard">
  <div id="settingsSection">
    <h1>알람 설정</h1>
    <form id="alarmForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="time-input">알람 시간</label>
        <input id="time-input" class="form-control" type="time" name="time" required>
      </div>

      <div class="form-group">
        <label for="file-input">알람 음악 (미선택 시 기본음)</label>
        <label for="file-input" class="custom-file-upload">파일 선택</label>
        <input id="file-input" type="file" name="file" accept="audio/*">
        <div id="fileName">선택된 파일 없음</div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">설정 완료</button>
    </form>
  </div>

  <div id="playerSection" style="display:none;">
    <h1 id="playerTitle">알람 대기 중</h1>
    <p><strong id="displayTime"></strong></p>
    <audio id="myAudio" loop></audio>
    <div>
      <button onclick="stopAudio()" class="btn btn-primary">끄기</button>
      <button onclick="resetAlarm()" class="btn btn-secondary">다시 설정하기</button>
    </div>
  </div>
</div>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/alarm.js}"></script>
</body>
</html>
