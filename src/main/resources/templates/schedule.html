<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>QWER 스케줄러</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/schedule.css}">
</head>
<body>

<nav class="main-nav">
    <div class="nav-left">
        <a href="/alarm" class="nav-item">알람</a>
        <a href="/auth/timer" class="nav-item">타이머</a>
        <a href="/auth/schedule" class="nav-item">스케줄</a>
        <a href="/auth/shop" class="nav-item">상점</a>
    </div>

    <div class="nav-right">
    <span class="user-info">
      <strong id="navNickname">로딩 중...</strong>님
      (<span id="navPoint">0</span> P)
    </span>
        <button id="themeToggle" class="nav-item" style="background:none; border:none; cursor:pointer; font-size: 1.2em;">🌓</button>
    </div>
</nav>

<div class="calendar-card">
    <div class="calendar-header">
        <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer; font-size:20px;">◀</button>
        <h2 id="monthDisplay">2024년 5월</h2>
        <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer; font-size:20px;">▶</button>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <div class="day-label" style="color:red">일</div>
        <div class="day-label">월</div>
        <div class="day-label">화</div>
        <div class="day-label">수</div>
        <div class="day-label">목</div>
        <div class="day-label">금</div>
        <div class="day-label" style="color:blue">토</div>
    </div>
</div>

<div id="scheduleModal" class="modal">
    <div class="modal-content">
        <h3 id="targetDateTitle">일정 추가</h3>
        <input type="time" id="timeInput" class="form-control"> <input type="text" id="scheduleInput" class="form-control" placeholder="무엇을 하나요?">
        <button onclick="saveToSpring()" class="btn btn-primary">저장하기</button>
        <button onclick="closeModal()" class="btn btn-secondary">닫기</button>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/schedule.js}"></script>
</body>
</html>
