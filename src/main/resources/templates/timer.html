<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>타이머</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/timer.css}">
</head>
<body>
<nav class="main-nav">
    <div class="nav-left">
        <a href="/alarm" class="nav-item">알람</a>
        <a href="/auth/timer" class="nav-item">타이머</a>
        <a href="/auth/schedule" class="nav-item">스케줄</a>
        <a href="/auth/shop" class="nav-item">상점</a>
    </div>

    <div class="nav-right">
    <span class="user-info">
      <strong id="navNickname">로딩 중...</strong>님
      (<span id="navPoint">0</span> P)
    </span>
        <button id="themeToggle" class="nav-item" style="background:none; border:none; cursor:pointer; font-size: 1.2em;">🌓</button>
    </div>
</nav>

<div class="container">
    <h1>타이머</h1>
    <div class = "input-group">
        <input type="number" id="minutesInput" placeholder="분" min="0"/> :
        <input type="number" id="secondsInput" placeholder="초" min="0"/>
    </div>
    <div class="timer-display" id="display">00:00</div>
    <div class="buttons">
        <button id="startButton">시작</button>
        <button id="stopButton">중지</button>
        <button id="resetButton">초기화</button>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/timer.js}"></script>
</body>
</html>
